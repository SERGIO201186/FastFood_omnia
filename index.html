<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Panel — FastFood Omnia</title>
<style>
  :root { --bg:#1F1B16; --panel:#2A2118; --panel2:#17130F; --border:#3D3225; --text:#F7F1E6; --muted:#8A7A63; --accent:#E8A33D; --accent2:#F0B45C; --danger:#D98A8A; --ok:#A9C98A; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--text); font-family: -apple-system, Segoe UI, Roboto, sans-serif; }
  input, select, textarea, button { font-family: inherit; }
  .hidden { display:none !important; }

  /* ---- Login / setup ---- */
  #pantallaLogin { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
  .card { background:var(--panel2); border:1px solid var(--border); border-radius:16px; padding:28px; width:100%; max-width:380px; }
  .card h2 { margin:0 0 4px; }
  .card p.sub { color:var(--muted); font-size:13px; margin:0 0 20px; }
  label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; display:block; margin-bottom:4px; }
  input[type=text], input[type=password], input[type=number], input[type=date], input[type=time], select, textarea {
    width:100%; background:var(--panel); border:1px solid var(--border); color:var(--text); border-radius:8px; padding:9px 11px; font-size:14px; margin-bottom:14px; outline:none;
  }
  input:focus, select:focus, textarea:focus { border-color:var(--accent); }
  button.primary { width:100%; background:var(--accent); color:var(--panel2); font-weight:600; border:none; border-radius:8px; padding:11px; font-size:14px; cursor:pointer; }
  button.primary:hover { background:var(--accent2); }
  button.primary:disabled { background:#4A3D2C; color:#6B5D48; cursor:default; }
  button.ghost { background:var(--panel2); border:1px solid var(--border); color:var(--muted); border-radius:8px; padding:8px 12px; font-size:12px; cursor:pointer; }
  button.ghost:hover { color:var(--text); }
  .error { color:var(--danger); font-size:12px; margin:-8px 0 12px; }

  /* ---- App shell ---- */
  #app { min-height:100vh; }
  header.top { background:var(--panel); border-bottom:1px solid var(--border); padding:12px 18px; display:flex; align-items:center; gap:10px; flex-wrap:wrap; position:sticky; top:0; z-index:10; }
  header.top h1 { font-size:15px; margin:0; flex:1; }
  nav.tabs { display:flex; gap:4px; background:var(--panel); border-bottom:1px solid var(--border); padding:0 18px; overflow-x:auto; }
  nav.tabs button { background:none; border:none; color:var(--muted); padding:12px 16px; font-size:13px; cursor:pointer; border-bottom:2px solid transparent; white-space:nowrap; }
  nav.tabs button.activo { color:var(--accent); border-bottom-color:var(--accent); }
  main { max-width:1100px; margin:0 auto; padding:20px 18px 60px; }
  .kpis { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:1px; background:var(--border); border-bottom:1px solid var(--border); }
  .kpi { background:var(--bg); padding:12px 16px; }
  .kpi .l { color:#6B5D48; font-size:10px; text-transform:uppercase; }
  .kpi .v { font-size:18px; font-weight:600; }

  table { width:100%; border-collapse:collapse; font-size:13px; }
  th { text-align:left; background:var(--panel); color:var(--muted); font-size:11px; text-transform:uppercase; padding:8px 10px; }
  td { padding:8px 10px; border-top:1px solid var(--border); }
  .tablewrap { border:1px solid var(--border); border-radius:8px; overflow:auto; }
  .vacio { color:#5A4E3C; font-style:italic; font-size:13px; }

  .grid-menu { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:14px; }
  .platillo-card { background:var(--panel); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
  .platillo-card .foto { aspect-ratio:4/3; background-size:cover; background-position:center; display:flex; align-items:center; justify-content:center; font-size:34px; }
  .platillo-card .body { padding:10px; }
  .badge { display:inline-block; font-size:10px; padding:2px 8px; border-radius:99px; margin-top:4px; }
  .badge.si { background:#2E3A22; color:var(--ok); }
  .badge.no { background:#3A2222; color:var(--danger); }

  .kanban { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:12px; }
  .columna { background:var(--panel2); border:1px solid var(--border); border-radius:10px; padding:10px; }
  .columna h3 { font-size:13px; margin:0 0 10px; display:flex; justify-content:space-between; }
  .pedido-card { background:var(--panel); border:1px solid var(--border); border-radius:8px; padding:10px; margin-bottom:8px; }
  .pedido-card .top { display:flex; justify-content:space-between; font-size:11px; margin-bottom:4px; }
  .pedido-card .items { color:var(--muted); font-size:12px; margin-bottom:6px; }
  .pedido-card .foot { display:flex; justify-content:space-between; align-items:center; }

  .toolbar { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; align-items:center; }
  .toolbar input, .toolbar select { margin-bottom:0; width:auto; flex:1; min-width:150px; }

  .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.6); display:flex; align-items:center; justify-content:center; padding:16px; z-index:50; }
  .modal { background:var(--panel2); border:1px solid var(--border); border-radius:16px; padding:22px; width:100%; max-width:420px; max-height:88vh; overflow-y:auto; }
  .modal h3 { margin:0 0 14px; }
  .row2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--accent); color:var(--panel2); font-weight:600; font-size:13px; padding:10px 18px; border-radius:99px; z-index:100; }
</style>
</head>
<body>

<!-- ============== LOGIN / CONFIGURACIÓN INICIAL ============== -->
<div id="pantallaLogin">
  <div class="card">
    <h2>Panel FastFood Omnia</h2>
    <p class="sub">Mesero, cocina y administración en un solo lugar.</p>
    <div id="bloqueUrl">
      <label>URL de tu aplicación web (Apps Script)</label>
      <input type="text" id="inputUrl" placeholder="https://script.google.com/macros/s/.../exec" />
    </div>
    <label>Contraseña del panel</label>
    <input type="password" id="inputSecret" placeholder="DASHBOARD_SECRET" />
    <p class="error hidden" id="errorLogin"></p>
    <button class="primary" id="btnEntrar">Entrar</button>
  </div>
</div>

<!-- ============== APP ============== -->
<div id="app" class="hidden">
  <header class="top">
    <h1>🍔 FastFood Omnia — Panel</h1>
    <button class="ghost" id="btnActualizar">↻ Actualizar</button>
    <button class="ghost" id="btnSalir">Cerrar sesión</button>
  </header>

  <div class="kpis">
    <div class="kpi"><div class="l">Ventas del día</div><div class="v" id="kpiVentas">$0</div></div>
    <div class="kpi"><div class="l">Pedidos activos</div><div class="v" id="kpiPedidos">0</div></div>
    <div class="kpi"><div class="l">Reservaciones</div><div class="v" id="kpiReservaciones">0</div></div>
    <div class="kpi"><div class="l">Tickets a humano</div><div class="v" id="kpiTickets">0</div></div>
  </div>

  <nav class="tabs">
    <button data-tab="mesero" class="activo">🪑 Mesero</button>
    <button data-tab="cocina">👨‍🍳 Cocina</button>
    <button data-tab="menu">📋 Menú</button>
    <button data-tab="reservaciones">📅 Reservaciones</button>
    <button data-tab="tickets">🆘 Tickets</button>
    <button data-tab="config">⚙️ Configuración</button>
  </nav>

  <main>
    <!-- ---- MESERO ---- -->
    <section id="tab-mesero">
      <div class="toolbar">
        <label style="margin:0;">Mesa:</label>
        <select id="selMesa"></select>
        <span id="totalComandaMesero" style="margin-left:auto; font-weight:600;"></span>
      </div>
      <div id="itemsComandaMesero" style="margin-bottom:14px;"></div>
      <div class="toolbar">
        <select id="selPlatilloMesero"></select>
        <input type="number" id="cantPlatilloMesero" value="1" min="1" style="max-width:80px;" />
        <button class="ghost" id="btnAgregarComanda">+ Agregar</button>
      </div>
      <button class="primary" id="btnEnviarCocina" style="max-width:260px;">Enviar a cocina</button>
    </section>

    <!-- ---- COCINA ---- -->
    <section id="tab-cocina" class="hidden">
      <div class="kanban" id="kanbanCocina"></div>
    </section>

    <!-- ---- MENÚ ---- -->
    <section id="tab-menu" class="hidden">
      <div class="toolbar">
        <input type="text" id="buscarMenu" placeholder="Buscar platillo…" />
        <button class="ghost" id="btnNuevoPlatillo">+ Nuevo platillo</button>
      </div>
      <div class="grid-menu" id="gridMenu"></div>
    </section>

    <!-- ---- RESERVACIONES ---- -->
    <section id="tab-reservaciones" class="hidden">
      <div class="tablewrap"><table id="tablaReservaciones"></table></div>
    </section>

    <!-- ---- TICKETS ---- -->
    <section id="tab-tickets" class="hidden">
      <div id="listaTickets"></div>
    </section>

    <!-- ---- CONFIG ---- -->
    <section id="tab-config" class="hidden" style="max-width:420px;">
      <div id="formConfig"></div>
      <button class="primary" id="btnGuardarConfig">Guardar configuración</button>
    </section>
  </main>
</div>

<div id="modalPlatillo" class="modal-bg hidden">
  <div class="modal">
    <h3 id="tituloModalPlatillo">Nuevo platillo</h3>
    <label>Nombre</label><input type="text" id="mPlatillo" />
    <div class="row2">
      <div><label>Precio (MXN)</label><input type="number" id="mPrecio" /></div>
      <div><label>Categoría</label><input type="text" id="mCategoria" /></div>
    </div>
    <label>Descripción</label><textarea id="mDescripcion" rows="2"></textarea>
    <label>URL de la foto (opcional)</label><input type="text" id="mImagen" placeholder="https://..." />
    <label><input type="checkbox" id="mDisponible" style="width:auto; display:inline-block;" checked /> Disponible</label>
    <div style="display:flex; gap:8px; margin-top:14px;">
      <button class="primary" id="btnGuardarPlatillo">Guardar</button>
      <button class="ghost" id="btnCerrarModalPlatillo">Cancelar</button>
      <button class="ghost" id="btnEliminarPlatillo" style="color:var(--danger); margin-left:auto;">Eliminar</button>
    </div>
  </div>
</div>

<script>
// =====================================================================
// CONFIGURACIÓN / SESIÓN
// =====================================================================
let WEB_APP_URL = localStorage.getItem('ffo_url') || '';
let SECRET = localStorage.getItem('ffo_secret') || '';
let editandoPlatilloId = null;

document.getElementById('inputUrl').value = WEB_APP_URL;
if (WEB_APP_URL) document.getElementById('bloqueUrl').classList.add('hidden');

document.getElementById('btnEntrar').addEventListener('click', async () => {
  const url = document.getElementById('inputUrl').value.trim() || WEB_APP_URL;
  const secret = document.getElementById('inputSecret').value.trim();
  const err = document.getElementById('errorLogin');
  err.classList.add('hidden');
  if (!url || !secret) { err.textContent = 'Falta la URL o la contraseña.'; err.classList.remove('hidden'); return; }

  WEB_APP_URL = url; SECRET = secret;
  const r = await apiGet('config');
  if (!r.ok) { err.textContent = 'No se pudo entrar — revisa la URL y la contraseña.'; err.classList.remove('hidden'); return; }

  localStorage.setItem('ffo_url', WEB_APP_URL);
  localStorage.setItem('ffo_secret', SECRET);
  document.getElementById('pantallaLogin').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  cargarTodo();
});

document.getElementById('btnSalir').addEventListener('click', () => {
  localStorage.removeItem('ffo_secret');
  location.reload();
});

// =====================================================================
// CLIENTE HTTP — sin header Content-Type a propósito: Apps Script no
// responde bien al preflight CORS que dispara application/json cuando el
// dashboard vive en otro dominio (ej. GitHub Pages). Con text/plain (el
// default de fetch) el navegador no manda preflight, y del lado de Apps
// Script el JSON se puede parsear igual desde e.postData.contents.
// =====================================================================
async function apiGet(sheet) {
  try {
    const res = await fetch(`${WEB_APP_URL}?action=get&sheet=${encodeURIComponent(sheet)}&secret=${encodeURIComponent(SECRET)}`);
    return await res.json();
  } catch (e) { return { ok: false, error: String(e) }; }
}
async function apiPost(body) {
  try {
    const res = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ ...body, secret: SECRET }) });
    return await res.json();
  } catch (e) { return { ok: false, error: String(e) }; }
}
function toast(msg) {
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2200);
}

// =====================================================================
// ESTADO EN MEMORIA
// =====================================================================
let MENU = [], PEDIDOS = [], RESERVACIONES = [], TICKETS = [], CONFIG = {};
let comandaMesero = []; // [{platillo, cantidad, precio}]

async function cargarTodo() {
  const [menu, pedidos, reservaciones, tickets, config] = await Promise.all([
    apiGet('menu'), apiGet('pedidos'), apiGet('reservaciones'), apiGet('tickets'), apiGet('config'),
  ]);
  MENU = menu.ok ? menu.data : [];
  PEDIDOS = pedidos.ok ? pedidos.data : [];
  RESERVACIONES = reservaciones.ok ? reservaciones.data : [];
  TICKETS = tickets.ok ? tickets.data : [];
  CONFIG = {}; (config.ok ? config.data : []).forEach(r => CONFIG[r.key] = r.value);

  renderKpis();
  renderMesero();
  renderCocina();
  renderMenu();
  renderReservaciones();
  renderTickets();
  renderConfig();
}
document.getElementById('btnActualizar').addEventListener('click', cargarTodo);
setInterval(cargarTodo, 8000); // refresco automático

// =====================================================================
// TABS
// =====================================================================
document.querySelectorAll('nav.tabs button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('nav.tabs button').forEach(b => b.classList.remove('activo'));
    btn.classList.add('activo');
    document.querySelectorAll('main section').forEach(s => s.classList.add('hidden'));
    document.getElementById('tab-' + btn.dataset.tab).classList.remove('hidden');
  });
});

// =====================================================================
// KPIs
// =====================================================================
function renderKpis() {
  const ventas = PEDIDOS.reduce((a, p) => a + Number(p.total || 0), 0);
  const activos = PEDIDOS.filter(p => p.estado !== 'cobrado').length;
  document.getElementById('kpiVentas').textContent = '$' + ventas.toFixed(2);
  document.getElementById('kpiPedidos').textContent = activos;
  document.getElementById('kpiReservaciones').textContent = RESERVACIONES.length;
  document.getElementById('kpiTickets').textContent = TICKETS.length;
}

// =====================================================================
// MESERO — arma una comanda por mesa y la manda a cocina
// =====================================================================
function renderMesero() {
  const selMesa = document.getElementById('selMesa');
  if (!selMesa.dataset.listo) {
    selMesa.innerHTML = Array.from({ length: 12 }, (_, i) => `<option value="${i + 1}">Mesa ${i + 1}</option>`).join('');
    selMesa.dataset.listo = '1';
  }
  const selPlat = document.getElementById('selPlatilloMesero');
  selPlat.innerHTML = MENU.filter(p => esDisponible(p.disponible)).map(p => `<option value="${p.id}">${p.platillo} — $${p.precio}</option>`).join('');

  const cont = document.getElementById('itemsComandaMesero');
  if (comandaMesero.length === 0) {
    cont.innerHTML = '<p class="vacio">Sin platillos agregados todavía.</p>';
  } else {
    cont.innerHTML = comandaMesero.map((it, i) =>
      `<div style="display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid var(--border);">
        <span>${it.cantidad} × ${it.platillo}</span>
        <span>$${(it.cantidad * it.precio).toFixed(2)} <a href="#" data-i="${i}" class="quitarItem" style="color:var(--danger); margin-left:8px;">✕</a></span>
      </div>`
    ).join('');
    cont.querySelectorAll('.quitarItem').forEach(a => a.addEventListener('click', e => {
      e.preventDefault();
      comandaMesero.splice(Number(a.dataset.i), 1);
      renderMesero();
    }));
  }
  const total = comandaMesero.reduce((a, it) => a + it.cantidad * it.precio, 0);
  document.getElementById('totalComandaMesero').textContent = comandaMesero.length ? `Total: $${total.toFixed(2)}` : '';
}

document.getElementById('btnAgregarComanda').addEventListener('click', () => {
  const id = document.getElementById('selPlatilloMesero').value;
  const cantidad = Math.max(1, Number(document.getElementById('cantPlatilloMesero').value) || 1);
  const p = MENU.find(m => m.id === id);
  if (!p) return;
  const existente = comandaMesero.find(it => it.platillo === p.platillo);
  if (existente) existente.cantidad += cantidad;
  else comandaMesero.push({ platillo: p.platillo, cantidad, precio: Number(p.precio) });
  renderMesero();
});

document.getElementById('btnEnviarCocina').addEventListener('click', async () => {
  if (comandaMesero.length === 0) return toast('Agrega al menos un platillo.');
  const mesa = document.getElementById('selMesa').value;
  const total = comandaMesero.reduce((a, it) => a + it.cantidad * it.precio, 0);
  const data = {
    id: 'MSA_' + Date.now(), origen: 'mesa', mesa, referencia: `Mesa ${mesa}`,
    items: JSON.stringify(comandaMesero.map(it => ({ cantidad: it.cantidad, platillo: it.platillo }))),
    total, estado: 'nuevo', pagado: '', hora: new Date().toLocaleTimeString('es-MX'), fecha: new Date().toISOString(), hora_liberacion: '', notas: '',
  };
  const r = await apiPost({ action: 'upsert', sheet: 'pedidos', data });
  if (r.ok) { toast('Comanda enviada a cocina ✅'); comandaMesero = []; renderMesero(); cargarTodo(); }
  else toast('Error: ' + r.error);
});

// =====================================================================
// COCINA — kanban de pedidos activos (mesa + WhatsApp)
// =====================================================================
const COLUMNAS = [
  { id: 'nuevo', t: '🆕 Nuevo', sig: 'preparacion' },
  { id: 'preparacion', t: '🍳 En preparación', sig: 'listo' },
  { id: 'listo', t: '✅ Listo', sig: 'servido' },
];
function renderCocina() {
  const cont = document.getElementById('kanbanCocina');
  cont.innerHTML = COLUMNAS.map(col => {
    const items = PEDIDOS.filter(p => p.estado === col.id);
    return `<div class="columna"><h3>${col.t}<span>${items.length}</span></h3>${
      items.length === 0 ? '<p class="vacio">Sin pedidos.</p>' :
      items.map(p => {
        let items2 = []; try { items2 = JSON.parse(p.items || '[]'); } catch (e) {}
        const origenTxt = p.origen === 'mesa' ? `🪑 Mesa ${p.mesa}` : '📱 WhatsApp';
        const pagado = esDisponible(p.pagado);
        return `<div class="pedido-card">
          <div class="top"><span>${origenTxt}</span><span>${p.hora || ''}</span></div>
          <div style="font-size:12px; margin-bottom:2px;">${p.referencia || ''}</div>
          <div class="items">${items2.map(it => `${it.cantidad}× ${it.platillo}`).join(', ')}</div>
          <div class="foot"><b>$${Number(p.total || 0).toFixed(2)}</b>
            <span class="badge ${pagado ? 'si' : 'no'} marcarPagado" data-id="${p.id}" data-pagado="${pagado}" style="cursor:pointer;">${pagado ? '✅ Pagado' : '⏳ Por cobrar'}</span>
            <button class="ghost avanzar" data-id="${p.id}" data-sig="${col.sig}">${col.sig === 'servido' ? 'Entregado' : 'Avanzar →'}</button>
          </div>
        </div>`;
      }).join('')
    }</div>`;
  }).join('');
  cont.querySelectorAll('.avanzar').forEach(btn => btn.addEventListener('click', async () => {
    const pedido = PEDIDOS.find(p => p.id === btn.dataset.id);
    if (!pedido) return;
    const r = await apiPost({ action: 'upsert', sheet: 'pedidos', data: { ...pedido, estado: btn.dataset.sig } });
    if (r.ok) cargarTodo(); else toast('Error: ' + r.error);
  }));
  cont.querySelectorAll('.marcarPagado').forEach(el => el.addEventListener('click', async () => {
    const pedido = PEDIDOS.find(p => p.id === el.dataset.id);
    if (!pedido) return;
    const nuevoPagado = el.dataset.pagado === 'true' ? '' : 'true';
    const r = await apiPost({ action: 'upsert', sheet: 'pedidos', data: { ...pedido, pagado: nuevoPagado } });
    if (r.ok) cargarTodo(); else toast('Error: ' + r.error);
  }));

  // Pedidos programados: comida pedida por adelantado para una reservación
  // futura, que el sistema todavía no suelta a cocina (se libera solo 1h
  // antes de la reservación). Aquí nomás se muestran para que el staff sepa
  // que vienen, no se pueden avanzar manualmente.
  const programados = PEDIDOS.filter(p => p.estado === 'programado');
  let bloqueProgramados = document.getElementById('bloqueProgramados');
  if (!bloqueProgramados) {
    bloqueProgramados = document.createElement('div');
    bloqueProgramados.id = 'bloqueProgramados';
    bloqueProgramados.style.marginTop = '16px';
    document.getElementById('tab-cocina').appendChild(bloqueProgramados);
  }
  bloqueProgramados.innerHTML = `<h3 style="font-size:13px; color:var(--muted);">📅 Programados (aún no van a cocina)</h3>` + (
    programados.length === 0 ? '<p class="vacio">Ninguno por ahora.</p>' :
    `<div class="tablewrap"><table><thead><tr><th>Referencia</th><th>Platillos</th><th>Se libera</th><th>Nota</th></tr></thead><tbody>${
      programados.map(p => {
        let items2 = []; try { items2 = JSON.parse(p.items || '[]'); } catch (e) {}
        const liberacion = p.hora_liberacion ? new Date(p.hora_liberacion).toLocaleString('es-MX') : '—';
        return `<tr><td>${p.referencia}</td><td>${items2.map(it => `${it.cantidad}× ${it.platillo}`).join(', ')}</td><td>${liberacion}</td><td>${p.notas || ''}</td></tr>`;
      }).join('')
    }</tbody></table></div>`
  );
}

// =====================================================================
// MENÚ
// =====================================================================
function esDisponible(v) { return v === true || v === 'true' || v === 'TRUE' || v === 1; }
function renderMenu() {
  const filtro = (document.getElementById('buscarMenu').value || '').toLowerCase();
  const grid = document.getElementById('gridMenu');
  const lista = MENU.filter(p => p.platillo.toLowerCase().includes(filtro));
  grid.innerHTML = lista.map(p => `
    <div class="platillo-card" data-id="${p.id}">
      <div class="foto" style="${p.imagen ? `background-image:url('${p.imagen}')` : 'background:#332B21;'}">${p.imagen ? '' : '🍽️'}</div>
      <div class="body">
        <div style="font-size:10px; color:var(--muted); text-transform:uppercase;">${p.categoria || ''}</div>
        <div style="font-weight:600;">${p.platillo}</div>
        <div style="color:var(--accent); font-weight:600;">$${Number(p.precio || 0).toFixed(2)}</div>
        <span class="badge ${esDisponible(p.disponible) ? 'si' : 'no'}">${esDisponible(p.disponible) ? 'Disponible' : 'Agotado'}</span>
      </div>
    </div>`).join('') || '<p class="vacio">Sin platillos.</p>';
  grid.querySelectorAll('.platillo-card').forEach(el => el.addEventListener('click', () => abrirModalPlatillo(el.dataset.id)));
}
document.getElementById('buscarMenu').addEventListener('input', renderMenu);
document.getElementById('btnNuevoPlatillo').addEventListener('click', () => abrirModalPlatillo(null));

function abrirModalPlatillo(id) {
  editandoPlatilloId = id;
  const p = MENU.find(m => m.id === id) || {};
  document.getElementById('tituloModalPlatillo').textContent = id ? 'Editar platillo' : 'Nuevo platillo';
  document.getElementById('mPlatillo').value = p.platillo || '';
  document.getElementById('mPrecio').value = p.precio || '';
  document.getElementById('mCategoria').value = p.categoria || '';
  document.getElementById('mDescripcion').value = p.descripcion || '';
  document.getElementById('mImagen').value = p.imagen || '';
  document.getElementById('mDisponible').checked = id ? esDisponible(p.disponible) : true;
  document.getElementById('btnEliminarPlatillo').style.display = id ? 'block' : 'none';
  document.getElementById('modalPlatillo').classList.remove('hidden');
}
document.getElementById('btnCerrarModalPlatillo').addEventListener('click', () => document.getElementById('modalPlatillo').classList.add('hidden'));

document.getElementById('btnGuardarPlatillo').addEventListener('click', async () => {
  const data = {
    id: editandoPlatilloId || ('PLT_' + Date.now()),
    platillo: document.getElementById('mPlatillo').value.trim(),
    precio: Number(document.getElementById('mPrecio').value) || 0,
    categoria: document.getElementById('mCategoria').value.trim(),
    descripcion: document.getElementById('mDescripcion').value.trim(),
    imagen: document.getElementById('mImagen').value.trim(),
    disponible: document.getElementById('mDisponible').checked,
    emoji: '🍽️', color: '#C7703C',
  };
  if (!data.platillo) return toast('Falta el nombre del platillo.');
  const r = await apiPost({ action: 'upsert', sheet: 'menu', data });
  if (r.ok) { toast('Guardado ✅'); document.getElementById('modalPlatillo').classList.add('hidden'); cargarTodo(); }
  else toast('Error: ' + r.error);
});

document.getElementById('btnEliminarPlatillo').addEventListener('click', async () => {
  if (!editandoPlatilloId) return;
  if (!confirm('¿Eliminar este platillo?')) return;
  const r = await apiPost({ action: 'delete', sheet: 'menu', id: editandoPlatilloId });
  if (r.ok) { toast('Eliminado'); document.getElementById('modalPlatillo').classList.add('hidden'); cargarTodo(); }
  else toast('Error: ' + r.error);
});

// =====================================================================
// RESERVACIONES (solo lectura)
// =====================================================================
function renderReservaciones() {
  const tabla = document.getElementById('tablaReservaciones');
  if (RESERVACIONES.length === 0) { tabla.innerHTML = ''; document.getElementById('tab-reservaciones').querySelector('.tablewrap').insertAdjacentHTML('beforebegin', ''); tabla.parentElement.innerHTML = '<p class="vacio">Sin reservaciones todavía.</p>'; return; }
  tabla.innerHTML = `<thead><tr><th>Fecha</th><th>Hora</th><th>Personas</th><th>Nombre</th><th>Teléfono</th></tr></thead>
    <tbody>${RESERVACIONES.map(r => `<tr><td>${r.fecha}</td><td>${r.hora}</td><td>${r.personas}</td><td>${r.nombre_cliente}</td><td>${r.telefono}</td></tr>`).join('')}</tbody>`;
}

// =====================================================================
// TICKETS — reactivar bot
// =====================================================================
function renderTickets() {
  const cont = document.getElementById('listaTickets');
  if (TICKETS.length === 0) { cont.innerHTML = '<p class="vacio">Sin tickets pendientes.</p>'; return; }
  cont.innerHTML = TICKETS.map(t => `
    <div class="pedido-card" style="display:flex; justify-content:space-between; align-items:center; gap:10px;">
      <div><div>${t.motivo}</div><div style="color:var(--muted); font-size:11px;">${t.telefono || ''} · ${t.time || ''}</div></div>
      <button class="ghost reactivar" data-tel="${t.telefono || ''}">Reactivar bot</button>
    </div>`).join('');
  cont.querySelectorAll('.reactivar').forEach(btn => btn.addEventListener('click', async () => {
    const r = await apiPost({ action: 'reactivarBot', telefono: btn.dataset.tel });
    if (r.ok) { toast('Bot reactivado ✅'); cargarTodo(); } else toast('Error: ' + r.error);
  }));
}

// =====================================================================
// CONFIGURACIÓN
// =====================================================================
const CAMPOS_CONFIG = [
  ['nombre_restaurante', 'Nombre del restaurante'],
  ['ubicacion', 'Ubicación'],
  ['horario_atencion', 'Horario'],
  ['costo_envio', 'Costo de envío (MXN)'],
  ['tiempo_preparacion_pickup_min', 'Tiempo estimado recoger (min)'],
  ['tiempo_entrega_domicilio_min', 'Tiempo estimado domicilio (min)'],
  ['capacidad_personas_por_turno', 'Capacidad por turno (personas)'],
];
function renderConfig() {
  document.getElementById('formConfig').innerHTML = CAMPOS_CONFIG.map(([key, label]) =>
    `<label>${label}</label><input type="text" id="cfg_${key}" value="${CONFIG[key] ?? ''}" />`
  ).join('');
}
document.getElementById('btnGuardarConfig').addEventListener('click', async () => {
  for (const [key] of CAMPOS_CONFIG) {
    const value = document.getElementById('cfg_' + key).value;
    await apiPost({ action: 'upsert', sheet: 'config', data: { key, value } });
  }
  toast('Configuración guardada ✅');
  cargarTodo();
});
</script>
