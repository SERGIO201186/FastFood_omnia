<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff · AtendIA</title>
<style>
:root{
  --bg:#1F1B16;--bg2:#17130F;--panel:#2A2118;--panel-alt:#332B21;
  --border:#3D3225;--border2:#4A3D2C;
  --text:#F7F1E6;--text2:#EFE7D8;
  --muted:#B8A890;--muted2:#8A7A63;--muted3:#6B5D48;--muted4:#5A4E3C;--muted5:#4A3D2C;
  --accent:#E8A33D;--accent-hover:#F0B45C;--accent-ink:#1F1B16;
  --danger:#D98A8A;
  --ok:#A9C98A;--ok2:#B9D99E;--ok-bg:#22301C;--ok-bg2:#2E3A22;--ok-border:#3A4A2E;
  --info:#8AB4D9;--info-bg:#1E2E3A;
  --radius:14px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;}
img{max-width:100%;display:block;}
#app{height:100vh;display:flex;flex-direction:column;}

/* LOGIN */
.login-wrap{height:100%;display:flex;align-items:center;justify-content:center;padding:20px;}
.login-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:28px;width:100%;max-width:360px;}
.login-box .icon{width:44px;height:44px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:16px;}
.login-box h2{font-size:20px;font-weight:600;margin-bottom:4px;}
.login-box p{color:var(--muted2);font-size:13px;margin-bottom:20px;}
.field-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:5px;}
.field-input{width:100%;background:var(--panel);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:10px 12px;font-size:14px;outline:none;margin-bottom:12px;}
.field-input:focus{border-color:var(--accent);}
.btn-primary{width:100%;background:var(--accent);color:var(--accent-ink);border:none;border-radius:8px;padding:11px;font-size:14px;font-weight:600;}
.btn-primary:hover{background:var(--accent-hover);}
.login-hint{font-size:10px;color:var(--muted4);margin-top:14px;text-align:center;}

/* NAV */
header.top{background:var(--panel);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
header.top h1{font-size:15px;font-weight:600;flex:1;}
header.top .meta{font-size:11px;color:var(--muted2);}
.icon-btn{background:none;border:none;color:var(--muted2);font-size:12px;border:1px solid var(--border);border-radius:8px;padding:6px 10px;}
.icon-btn:hover{color:var(--text);}
nav.tabs{display:flex;gap:2px;background:var(--panel);border-bottom:1px solid var(--border);padding:0 12px;overflow-x:auto;}
nav.tabs button{padding:11px 16px;font-size:13px;white-space:nowrap;background:none;border:none;color:var(--muted2);border-bottom:2px solid transparent;}
nav.tabs button.active{color:var(--accent);border-color:var(--accent);}
main{flex:1;overflow-y:auto;padding:16px;max-width:1100px;margin:0 auto;width:100%;}

.badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:999px;}
.badge-red{background:#3A2222;color:var(--danger);}
.badge-amber{background:#3A2E18;color:var(--accent);}
.badge-gray{background:var(--panel-alt);color:var(--muted);}
.badge-green{background:var(--ok-bg2);color:var(--ok2);}
.badge-blue{background:var(--info-bg);color:var(--info);}

/* MESERO */
.grid-mesas{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px;}
@media(min-width:520px){.grid-mesas{grid-template-columns:repeat(6,1fr);}}
.mesa-btn{aspect-ratio:1;border-radius:12px;border:1px solid var(--border);background:var(--panel);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;}
.mesa-btn.activa{background:#332318;border-color:#4A3420;}
.mesa-btn.servida{background:var(--ok-bg);border-color:var(--ok-border);}
.mesa-btn .num{font-size:17px;font-weight:700;}
.mesa-btn .estado{font-size:9px;font-weight:500;color:var(--accent);}
.mesa-btn.servida .estado{color:var(--ok2);}
.comanda-card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;}
.comanda-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.comanda-items{color:var(--muted2);font-size:11px;margin-bottom:8px;}
.comanda-foot{display:flex;justify-content:space-between;align-items:center;}
.btn-mini{font-size:11px;background:var(--bg2);border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:6px 10px;}
.btn-mini.pri{background:var(--accent);color:var(--accent-ink);font-weight:600;border:none;}

.grid-cat{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.cat-btn{aspect-ratio:4/3;border-radius:12px;border:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;}
.cat-btn .emoji{font-size:28px;}
.cat-btn .label{font-size:13px;font-weight:600;padding:0 8px;text-align:center;}

.plat-list{display:flex;flex-direction:column;gap:8px;}
.plat-row{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:left;}
.plat-row:disabled{opacity:.4;}
.plat-thumb{width:44px;height:44px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;overflow:hidden;}
.plat-thumb img{width:100%;height:100%;object-fit:cover;}
.plat-info{flex:1;min-width:0;}
.plat-name{font-size:13.5px;font-weight:500;}
.plat-price{font-size:11px;color:var(--muted2);}

/* COCINA */
.kanban{display:grid;grid-template-columns:1fr;gap:12px;}
@media(min-width:820px){.kanban{grid-template-columns:repeat(3,1fr);}}
.kanban-col{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px;}
.kanban-col .col-head{display:flex;justify-content:space-between;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:8px;}
.pedido-card{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:8px;}
.pedido-card .top-row{display:flex;justify-content:space-between;margin-bottom:6px;font-size:10px;}
.pedido-card .ref{font-size:12.5px;font-weight:500;margin-bottom:4px;}
.pedido-card ul{list-style:none;font-size:11px;color:var(--muted);margin-bottom:6px;}
.pedido-card .foot{display:flex;justify-content:space-between;align-items:center;}

/* DUEÑO / DASHBOARD */
.kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:16px;}
@media(min-width:640px){.kpis{grid-template-columns:repeat(4,1fr);}}
.kpi{background:var(--bg2);padding:12px;}
.kpi .label{font-size:10px;color:var(--muted3);text-transform:uppercase;letter-spacing:.04em;}
.kpi .value{font-size:17px;font-weight:600;margin-top:2px;}

.grid-menu{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
@media(min-width:640px){.grid-menu{grid-template-columns:repeat(3,1fr);}}
@media(min-width:900px){.grid-menu{grid-template-columns:repeat(4,1fr);}}
.menu-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.menu-card .thumb{aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;font-size:34px;}
.menu-card .thumb img{width:100%;height:100%;object-fit:cover;}
.menu-card .body{padding:10px;}
.menu-card .cat{font-size:9px;color:var(--muted2);text-transform:uppercase;letter-spacing:.04em;}
.menu-card .name{font-size:13px;font-weight:600;}
.menu-card .desc{font-size:10.5px;color:var(--muted2);margin-top:2px;}
.menu-card .price{color:var(--accent);font-weight:600;font-size:13px;margin-top:5px;}
.menu-actions{display:flex;gap:6px;margin-top:8px;}

table.simple{width:100%;font-size:13px;border-collapse:collapse;}
table.simple thead th{text-align:left;font-size:10.5px;color:var(--muted2);text-transform:uppercase;padding:8px 10px;background:var(--panel);}
table.simple tbody td{padding:8px 10px;border-top:1px solid var(--border);color:var(--text2);}
table.simple{border:1px solid var(--border);border-radius:8px;overflow:hidden;}

.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center;}
.toolbar input,.toolbar select{background:var(--panel);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 10px;font-size:13px;}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:60;padding:16px;}
.modal-overlay.abierto{display:flex;}
.modal-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;width:100%;max-width:380px;padding:20px;max-height:90vh;overflow-y:auto;}
.modal-box .head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.modal-box h3{font-size:16px;font-weight:600;}
.upload-box{aspect-ratio:4/3;border-radius:10px;border:1.5px dashed var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted4);font-size:11px;cursor:pointer;margin-bottom:12px;overflow:hidden;}
.upload-box img{width:100%;height:100%;object-fit:cover;}
.checkbox-row{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);margin-top:8px;}
</style>
</head>
<body>
<div id="app"></div>

<script>
const ATENDIA_BACKEND_URL = 'https://script.google.com/macros/s/AKfycbzhU4ElNfiCO808AgiXcIxj3cazaAdrtiXdpGJ_f-FnCb3LqsrseZbBSCJ7-WaMrxdWcA/exec';

// ══════════════════════════════════════════════════════════
//  LICENCIA: se valida contra el Panel Maestro de Omnia (Control Central),
//  igual que NovaPOS/FarmaPOS. Este backend (Code_atendia.gs) NO maneja
//  licencias — solo guarda los datos propios del restaurante (menú, pedidos, etc).
// ══════════════════════════════════════════════════════════
const OMNIA_CONTROL_URL = 'PEGA_AQUI_LA_URL_/exec_DEL_PANEL_MAESTRO'; // ← Omnia: pega aquí la URL /exec del Panel Maestro antes de entregar la app
const ATENDIA_PRODUCT_ID = 'prod_atendia'; // debe existir con este id en la pestaña "Products" del Sheet maestro de Omnia
const RECHEQUEO_HORAS = 6;
const TOLERANCIA_OFFLINE_HORAS = 72;

async function consultarLicenciaOmnia(clave) {
  const r = await fetch(`${OMNIA_CONTROL_URL}?action=verify&key=${encodeURIComponent(clave)}&productId=${encodeURIComponent(ATENDIA_PRODUCT_ID)}&_=${Date.now()}`, { cache: 'no-store' });
  if (!r.ok) throw new Error('bad response');
  return r.json(); // {status: "active"|"expired"|"locked"|"not_found", expiresAt}
}

async function backendGet(sheet) {
  if (!ATENDIA_BACKEND_URL || ATENDIA_BACKEND_URL.indexOf('http') !== 0) return [];
  try {
    const r = await fetch(`${ATENDIA_BACKEND_URL}?action=get&sheet=${sheet}`);
    const j = await r.json();
    return j.ok ? j.data : [];
  } catch (e) { console.error('Error al leer', sheet, e); return []; }
}
async function backendPost(body) {
  try {
    const r = await fetch(ATENDIA_BACKEND_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify(body) });
    return await r.json();
  } catch (e) { console.error('Error de conexión con el backend', e); return { ok: false }; }
}
function nowLabel() { return new Date().toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' }); }
function escapeHtml(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }
function esc(s) { return escapeHtml(s); }

const MESAS = Array.from({ length: 10 }, (_, i) => i + 1);
const COLUMNAS_COCINA = [
  { id: 'nuevo', titulo: '🆕 Nuevo', siguiente: 'preparacion', accion: 'Empezar a preparar' },
  { id: 'preparacion', titulo: '🍳 En preparación', siguiente: 'listo', accion: 'Marcar listo' },
  { id: 'listo', titulo: '✅ Listo', siguiente: null, accion: null },
];
const ESTADO_PEDIDO_LABEL = { nuevo: '🆕 Nuevo', preparacion: '🍳 En preparación', listo: '🔔 Listo', servido: '✅ Servido', cobrado: '💰 Cobrado' };

// ==================== ESTADO GLOBAL ====================
let licenciaActiva = false;
let autenticado = false;
let usuarioActivo = '';
let currentTab = 'mesero';
const STATE = { config: {}, menu: [], pedidos: [], reservaciones: [], tickets: [] };

// mesero
let vistaMesero = 'mesas';
let mesaActiva = null;
let categoriaActiva = null;
let platilloActivo = null;
let cantidadTmp = 1;
let comandasEnCurso = {};

// dueño
let tabDueno = 'menu';
let modalPlatillo = null;
let busquedaMenu = '';
let filtroCategoriaMenu = '';

async function cargarTodo() {
  const [config, menu, pedidos, reservaciones, tickets] = await Promise.all(
    ['config', 'menu', 'pedidos', 'reservaciones', 'tickets'].map(backendGet)
  );
  const cfgObj = {}; config.forEach(r => { cfgObj[r.key] = r.value; });
  STATE.config = cfgObj;
  STATE.menu = menu.map(m => ({ ...m, precio: Number(m.precio) || 0, disponible: m.disponible !== false && m.disponible !== 'FALSE' && m.disponible !== 'false' }));
  STATE.pedidos = pedidos.map(p => ({ ...p, items: safeParse(p.items, []), total: Number(p.total) || 0 }));
  STATE.reservaciones = reservaciones;
  STATE.tickets = tickets;
}
function safeParse(s, fallback) { try { return JSON.parse(s); } catch (e) { return fallback; } }

// ==================== ACTIVACIÓN DE LICENCIA (una vez por dispositivo) ====================
function renderActivacion() {
  document.getElementById('app').innerHTML = `
    <div class="login-wrap"><div class="login-box">
      <div class="icon">🔑</div>
      <h2>Activar AtendIA</h2>
      <p>Ingresa la clave de licencia de tu restaurante para activar este dispositivo.</p>
      <label class="field-label">Clave de licencia</label>
      <input id="login-clave" class="field-input" placeholder="Pega tu clave de activación" onkeydown="if(event.key==='Enter')activarLicencia()">
      <div id="activacion-error" style="display:none;color:var(--danger);font-size:12px;margin:-4px 0 12px;"></div>
      <button class="btn-primary" id="btn-activar" onclick="activarLicencia()">Activar →</button>
      <p class="login-hint">¿No tienes clave? Contacta a Omnia Technology para adquirir tu licencia.</p>
    </div></div>`;
}
async function activarLicencia() {
  const clave = document.getElementById('login-clave').value.trim().toUpperCase();
  const errEl = document.getElementById('activacion-error');
  errEl.style.display = 'none';
  if (!clave) { errEl.textContent = 'Escribe tu clave de activación.'; errEl.style.display = 'block'; return; }
  const btn = document.getElementById('btn-activar');
  btn.disabled = true; btn.textContent = 'Verificando…';
  try {
    const j = await consultarLicenciaOmnia(clave);
    if (j.status !== 'active') {
      errEl.textContent = j.status === 'expired' ? '❌ Esta clave venció. Contacta a tu proveedor para renovarla.'
        : j.status === 'locked' ? '❌ Esta licencia fue desactivada. Contacta a tu proveedor.'
        : '❌ Clave inválida. Verifica que la escribiste correctamente.';
      errEl.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Activar →';
      return;
    }
    localStorage.setItem('atendia_licencia', JSON.stringify({ clave, expiresAt: j.expiresAt || null, ultimaValidacion: Date.now() }));
    licenciaActiva = true;
    renderLogin();
  } catch (e) {
    errEl.textContent = '⚠️ No se pudo conectar con el servidor de licencias. Intenta de nuevo.';
    errEl.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Activar →';
  }
}
// Revisa si este dispositivo ya tiene una licencia válida guardada. Solo vuelve a
// consultar al Panel Maestro cada RECHEQUEO_HORAS; si no hay red en ese momento,
// deja seguir trabajando con la última validación conocida hasta TOLERANCIA_OFFLINE_HORAS.
async function verificarSesionGuardada() {
  const raw = localStorage.getItem('atendia_licencia');
  if (!raw) return;
  let sesion;
  try { sesion = JSON.parse(raw); } catch (e) { localStorage.removeItem('atendia_licencia'); return; }
  if (!sesion.clave) { localStorage.removeItem('atendia_licencia'); return; }

  const horasDesdeValidacion = (Date.now() - (sesion.ultimaValidacion || 0)) / 3600000;
  if (horasDesdeValidacion < RECHEQUEO_HORAS) { licenciaActiva = true; return; }

  try {
    const j = await consultarLicenciaOmnia(sesion.clave);
    if (j.status !== 'active') { localStorage.removeItem('atendia_licencia'); return; }
    localStorage.setItem('atendia_licencia', JSON.stringify({ ...sesion, expiresAt: j.expiresAt || null, ultimaValidacion: Date.now() }));
    licenciaActiva = true;
  } catch (e) {
    if (horasDesdeValidacion < TOLERANCIA_OFFLINE_HORAS) licenciaActiva = true;
  }
}
function cambiarClaveLicencia() {
  if (!confirm('¿Cambiar la clave de licencia de este dispositivo?')) return;
  localStorage.removeItem('atendia_licencia');
  licenciaActiva = false; autenticado = false;
  renderActivacion();
}

// ==================== LOGIN DE TURNO (por miembro del staff) ====================
function renderLogin() {
  document.getElementById('app').innerHTML = `
    <div class="login-wrap"><div class="login-box">
      <div class="icon">🍴</div>
      <h2>${esc(STATE.config.nombre_restaurante || 'AtendIA')}</h2>
      <p>Panel interno — mesero, cocina y administración.</p>
      <label class="field-label">Usuario</label>
      <input id="login-user" class="field-input" placeholder="ej. dueño" onkeydown="if(event.key==='Enter')hacerLogin()">
      <button class="btn-primary" onclick="hacerLogin()">Entrar →</button>
      <p class="login-hint">Acceso solo para personal del restaurante. · <a href="#" onclick="cambiarClaveLicencia();return false;" style="color:var(--muted3);">Cambiar clave de licencia</a></p>
    </div></div>`;
}
function hacerLogin() {
  usuarioActivo = document.getElementById('login-user').value.trim() || 'staff';
  autenticado = true;
  renderShell();
}

// ==================== SHELL (nav + tabs) ====================
const TABS = [
  { id: 'mesero', label: '🪑 Mesero' },
  { id: 'cocina', label: '👨‍🍳 Cocina' },
  { id: 'dueno', label: '📊 Dueño' },
];
function renderShell() {
  document.getElementById('app').innerHTML = `
    <header class="top">
      <h1>${esc(STATE.config.nombre_restaurante || 'AtendIA')} · Staff</h1>
      <span class="meta">Sesión: ${esc(usuarioActivo)}</span>
      <button class="icon-btn" onclick="cerrarSesion()">Cerrar sesión</button>
    </header>
    <nav class="tabs">${TABS.map(t => `<button class="${currentTab === t.id ? 'active' : ''}" onclick="irA(${attr(t.id)})">${t.label}</button>`).join('')}</nav>
    <main id="main-view"></main>`;
  renderView();
}
function attr(s) { return "'" + String(s).replace(/\\/g, '\\\\').replace(/'/g, "\\'") + "'"; }
function irA(tab) { currentTab = tab; renderView(); }
function cerrarSesion() { autenticado = false; renderLogin(); }

function renderView() {
  const main = document.getElementById('main-view');
  if (currentTab === 'mesero') main.innerHTML = viewMesero();
  if (currentTab === 'cocina') main.innerHTML = viewCocina();
  if (currentTab === 'dueno') main.innerHTML = viewDueno();
}

// ==================== MESERO ====================
function categoriasMenu() { return [...new Set(STATE.menu.map(p => p.categoria))]; }
function comandaMesaActual() { return comandasEnCurso[mesaActiva] || []; }
function totalComandaActual() { return comandaMesaActual().reduce((acc, it) => acc + it.subtotal, 0); }
function pedidoActivoDeMesa(mesa) { return STATE.pedidos.find(p => p.origen === 'mesa' && String(p.mesa) === String(mesa) && p.estado !== 'cobrado'); }

function abrirMesa(mesa) { mesaActiva = mesa; vistaMesero = 'categoria'; renderView(); }
function volverMesero() {
  if (vistaMesero === 'platillos') vistaMesero = 'categoria';
  else if (vistaMesero === 'categoria') vistaMesero = 'mesas';
  else if (vistaMesero === 'comanda') vistaMesero = 'platillos';
  platilloActivo = null;
  renderView();
}
function abrirCategoria(cat) { categoriaActiva = cat; vistaMesero = 'platillos'; renderView(); }
function abrirPlatillo(id) { platilloActivo = STATE.menu.find(p => p.id === id); cantidadTmp = 1; renderView(); }
function cerrarPlatillo() { platilloActivo = null; renderView(); }
function cambiarCantidadTmp(delta) { cantidadTmp = Math.max(1, Math.min(20, cantidadTmp + delta)); renderView(); }
function agregarAComanda() {
  const platillo = platilloActivo, cantidad = cantidadTmp;
  const subtotal = cantidad * platillo.precio;
  const actual = comandasEnCurso[mesaActiva] || [];
  const idx = actual.findIndex(it => it.platillo === platillo.platillo);
  if (idx >= 0) { actual[idx].cantidad += cantidad; actual[idx].subtotal = actual[idx].cantidad * platillo.precio; }
  else actual.push({ platillo: platillo.platillo, cantidad, precio: platillo.precio, subtotal, emoji: platillo.emoji, color: platillo.color });
  comandasEnCurso[mesaActiva] = actual;
  platilloActivo = null; cantidadTmp = 1; vistaMesero = 'platillos';
  renderView();
}
function quitarDeComanda(platillo) {
  comandasEnCurso[mesaActiva] = (comandasEnCurso[mesaActiva] || []).filter(it => it.platillo !== platillo);
  renderView();
}
async function enviarACocina() {
  const items = comandaMesaActual();
  if (items.length === 0) return;
  const existente = pedidoActivoDeMesa(mesaActiva);
  const itemsNuevos = items.map(it => ({ cantidad: it.cantidad, platillo: it.platillo }));
  if (existente) {
    const itemsCombinados = [...existente.items, ...itemsNuevos];
    const totalNuevo = existente.total + totalComandaActual();
    await backendPost({ action: 'update', sheet: 'pedidos', id: existente.id, data: { items: JSON.stringify(itemsCombinados), total: totalNuevo, hora: nowLabel() } });
  } else {
    const id = 'MSA-' + Math.random().toString(36).slice(2, 7).toUpperCase();
    await backendPost({ action: 'upsert', sheet: 'pedidos', data: { id, origen: 'mesa', mesa: mesaActiva, referencia: `Mesa ${mesaActiva}`, items: JSON.stringify(itemsNuevos), total: totalComandaActual(), estado: 'nuevo', hora: nowLabel() } });
  }
  await cargarTodo();
  comandasEnCurso[mesaActiva] = [];
  vistaMesero = 'mesas'; mesaActiva = null;
  renderView();
}

function viewMesero() {
  if (vistaMesero === 'mesas') {
    const pedidosDeMesas = STATE.pedidos.filter(p => p.origen === 'mesa' && p.estado !== 'cobrado');
    return `
      <div class="grid-mesas">${MESAS.map(mesa => {
        const pedido = pedidoActivoDeMesa(mesa);
        const cls = pedido ? (pedido.estado === 'servido' ? 'servida' : 'activa') : '';
        return `<button class="mesa-btn ${cls}" onclick="abrirMesa(${mesa})"><span class="num">${mesa}</span>${pedido ? `<span class="estado">${{ nuevo: 'Nuevo', preparacion: 'En cocina', listo: 'Listo', servido: 'Servido' }[pedido.estado]}</span>` : ''}</button>`;
      }).join('')}</div>
      <p style="font-size:11px;color:var(--muted2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px;">👨‍🍳 Comandas activas</p>
      ${pedidosDeMesas.length === 0 ? `<p style="color:var(--muted5);font-size:12px;font-style:italic;">Ninguna mesa tiene pedido enviado a cocina.</p>` :
        pedidosDeMesas.map(p => `
          <div class="comanda-card">
            <div class="comanda-head"><strong style="font-size:13.5px;">Mesa ${esc(p.mesa)}</strong><span class="badge ${p.estado === 'servido' ? 'badge-green' : p.estado === 'listo' ? 'badge-blue' : 'badge-amber'}">${ESTADO_PEDIDO_LABEL[p.estado]}</span></div>
            <div class="comanda-items">${p.items.map(it => `${it.cantidad}× ${esc(it.platillo)}`).join(', ')}</div>
            <div class="comanda-foot"><span style="color:var(--accent);font-weight:600;">$${p.total.toFixed(2)}</span>
              <div style="display:flex;gap:6px;">
                ${p.estado === 'listo' ? `<button class="btn-mini" onclick="marcarServido(${attr(p.id)})">✅ Marcar servido</button>` : ''}
                ${p.estado === 'servido' ? `<button class="btn-mini pri" onclick="cobrarPedido(${attr(p.id)})">Cobrar y cerrar</button>` : ''}
              </div>
            </div>
          </div>`).join('')}`;
  }
  if (vistaMesero === 'categoria') {
    return `<button class="icon-btn" style="margin-bottom:12px;" onclick="volverMesero()">‹ Mesas</button>
      <h2 style="font-size:15px;margin-bottom:12px;">Mesa ${mesaActiva} · Categorías</h2>
      <div class="grid-cat">${categoriasMenu().map(cat => {
        const muestra = STATE.menu.find(p => p.categoria === cat);
        return `<button class="cat-btn" style="background:linear-gradient(135deg, ${muestra.color || '#C7703C'}, #1F1B16)" onclick="abrirCategoria(${attr(cat)})"><span class="emoji">${muestra.emoji || '🍽️'}</span><span class="label">${esc(cat)}</span></button>`;
      }).join('')}</div>`;
  }
  if (vistaMesero === 'platillos') {
    const items = STATE.menu.filter(p => p.categoria === categoriaActiva);
    return `<button class="icon-btn" style="margin-bottom:12px;" onclick="volverMesero()">‹ Categorías</button>
      <h2 style="font-size:15px;margin-bottom:12px;">Mesa ${mesaActiva} · ${esc(categoriaActiva)}</h2>
      ${comandaMesaActual().length > 0 ? `<button class="btn-mini pri" style="margin-bottom:12px;" onclick="irVistaMesero('comanda')">🧾 ${comandaMesaActual().reduce((a, it) => a + it.cantidad, 0)} · $${totalComandaActual().toFixed(2)}</button>` : ''}
      <div class="plat-list">${items.map(p => `
        <button class="plat-row" ${p.disponible ? '' : 'disabled'} onclick="abrirPlatillo(${attr(p.id)})">
          <div class="plat-thumb" style="background:${p.imagenUrl ? 'none' : `linear-gradient(135deg, ${p.color || '#C7703C'}, #1F1B16)`}">${p.imagenUrl ? `<img src="${esc(p.imagenUrl)}">` : (p.emoji || '🍽️')}</div>
          <div class="plat-info"><div class="plat-name">${esc(p.platillo)}</div><div class="plat-price">${p.disponible ? '$' + p.precio.toFixed(2) : 'Agotado'}</div></div>
          ${p.disponible ? '<span style="color:var(--accent);">+</span>' : ''}
        </button>`).join('')}</div>
      ${platilloActivo ? renderModalCantidad() : ''}`;
  }
  if (vistaMesero === 'comanda') {
    const items = comandaMesaActual();
    return `<button class="icon-btn" style="margin-bottom:12px;" onclick="volverMesero()">‹ Platillos</button>
      <h2 style="font-size:15px;margin-bottom:12px;">Comanda actual — Mesa ${mesaActiva}</h2>
      ${items.length === 0 ? `<p style="color:var(--muted5);font-size:12px;font-style:italic;margin-bottom:16px;">Sin platillos todavía.</p>` :
        items.map(it => `<div class="comanda-card" style="display:flex;align-items:center;gap:10px;">
          <div class="plat-thumb" style="background:linear-gradient(135deg, ${it.color || '#C7703C'}, #1F1B16)">${it.emoji || '🍽️'}</div>
          <div class="plat-info"><div class="plat-name">${it.cantidad} × ${esc(it.platillo)}</div><div class="plat-price">$${it.subtotal.toFixed(2)}</div></div>
          <button class="icon-btn" onclick="quitarDeComanda(${attr(it.platillo)})">🗑</button>
        </div>`).join('')}
      <div style="display:flex;justify-content:space-between;margin:14px 0;"><span style="color:var(--muted);">Total</span><span style="font-size:17px;font-weight:600;">$${totalComandaActual().toFixed(2)}</span></div>
      <button class="btn-primary" ${items.length === 0 ? 'disabled' : ''} onclick="enviarACocina()">Enviar a cocina →</button>
      <button class="icon-btn" style="width:100%;margin-top:8px;" onclick="irVistaMesero('platillos')">+ Agregar otro platillo</button>`;
  }
  return '';
}
function irVistaMesero(v) { vistaMesero = v; renderView(); }
function renderModalCantidad() {
  const p = platilloActivo;
  return `<div class="modal-overlay abierto"><div class="modal-box">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">
      <div class="plat-thumb" style="width:56px;height:56px;font-size:24px;background:${p.imagenUrl ? 'none' : `linear-gradient(135deg, ${p.color || '#C7703C'}, #1F1B16)`}">${p.imagenUrl ? `<img src="${esc(p.imagenUrl)}">` : (p.emoji || '🍽️')}</div>
      <div><div class="plat-name">${esc(p.platillo)}</div><div class="plat-price">$${p.precio.toFixed(2)} c/u</div></div>
    </div>
    <div style="display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:20px;">
      <button class="icon-btn" style="border-radius:50%;width:40px;height:40px;font-size:16px;" onclick="cambiarCantidadTmp(-1)">−</button>
      <span style="font-size:20px;font-weight:600;width:24px;text-align:center;">${cantidadTmp}</span>
      <button class="icon-btn" style="border-radius:50%;width:40px;height:40px;font-size:16px;" onclick="cambiarCantidadTmp(1)">+</button>
    </div>
    <button class="btn-primary" style="margin-bottom:8px;" onclick="agregarAComanda()">Agregar a la comanda · $${(p.precio * cantidadTmp).toFixed(2)}</button>
    <button class="icon-btn" style="width:100%;" onclick="cerrarPlatillo()">Cancelar</button>
  </div></div>`;
}
async function marcarServido(id) { await backendPost({ action: 'update', sheet: 'pedidos', id, data: { estado: 'servido' } }); await cargarTodo(); renderView(); }
async function cobrarPedido(id) { await backendPost({ action: 'update', sheet: 'pedidos', id, data: { estado: 'cobrado' } }); await cargarTodo(); renderView(); }

// ==================== COCINA ====================
function viewCocina() {
  const activos = STATE.pedidos.filter(p => ['nuevo', 'preparacion', 'listo'].includes(p.estado));
  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
      <h2 style="font-size:15px;">👨‍🍳 Cocina</h2><span style="color:var(--muted2);font-size:12px;">${activos.length} pedido(s) activo(s)</span>
    </div>
    <div class="kanban">${COLUMNAS_COCINA.map(col => {
      const items = STATE.pedidos.filter(p => p.estado === col.id).sort((a, b) => String(a.hora).localeCompare(String(b.hora)));
      return `<div class="kanban-col">
        <div class="col-head"><span>${col.titulo}</span><span>${items.length}</span></div>
        ${items.length === 0 ? `<p style="color:var(--muted5);font-size:11px;font-style:italic;">Sin pedidos aquí.</p>` : items.map(p => `
          <div class="pedido-card">
            <div class="top-row"><span class="badge ${p.origen === 'mesa' ? 'badge-gray' : 'badge-amber'}">${p.origen === 'mesa' ? '🪑 Mesa' : '💬 Chat'}</span><span style="color:var(--muted3);">🕐 ${esc(p.hora)}</span></div>
            <div class="ref">${esc(p.referencia)}</div>
            <ul>${p.items.map(it => `<li>${it.cantidad}× ${esc(it.platillo)}</li>`).join('')}</ul>
            <div class="foot"><span style="color:var(--accent);font-weight:600;font-size:13px;">$${p.total.toFixed(2)}</span>
              ${col.siguiente ? `<button class="btn-mini pri" onclick="avanzarPedido(${attr(p.id)},${attr(col.siguiente)})">${col.accion} →</button>` : `<button class="btn-mini" onclick="avanzarPedido(${attr(p.id)},'servido')">✅ Entregado</button>`}
            </div>
          </div>`).join('')}
      </div>`;
    }).join('')}</div>
    <div style="margin-top:16px;background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:12px;color:var(--muted3);font-size:11px;">💬 Esta pantalla se actualiza sola cada pocos segundos.</div>`;
}
async function avanzarPedido(id, siguiente) { await backendPost({ action: 'update', sheet: 'pedidos', id, data: { estado: siguiente } }); await cargarTodo(); renderView(); }

// ==================== DUEÑO ====================
function viewDueno() {
  const ventasHoy = STATE.pedidos.reduce((acc, p) => acc + p.total, 0);
  const pedidosPendientes = STATE.pedidos.filter(p => p.estado !== 'cobrado').length;
  return `
    <div class="kpis">
      ${[['Ventas de hoy', '$' + ventasHoy.toFixed(2)], ['Pedidos por cobrar', pedidosPendientes], ['Reservaciones', STATE.reservaciones.length], ['Tickets a humano', STATE.tickets.length]].map(([l, v]) => `<div class="kpi"><div class="label">${l}</div><div class="value">${v}</div></div>`).join('')}
    </div>
    <nav class="tabs" style="margin:0 0 16px;background:none;border-bottom:1px solid var(--border);padding:0;">
      ${[['menu', 'Menú'], ['reservaciones', 'Reservaciones'], ['pedidos', 'Pedidos'], ['tickets', `Tickets${STATE.tickets.length ? ` (${STATE.tickets.length})` : ''}`], ['config', 'Configuración']].map(([id, label]) => `<button class="${tabDueno === id ? 'active' : ''}" onclick="irTabDueno(${attr(id)})">${label}</button>`).join('')}
    </nav>
    <div id="dueno-body">${renderTabDueno()}</div>
    ${modalPlatillo !== null ? renderModalPlatillo() : ''}`;
}
function irTabDueno(id) { tabDueno = id; renderView(); }

function renderTabDueno() {
  if (tabDueno === 'menu') {
    const categorias = [...new Set(STATE.menu.map(p => p.categoria))];
    const filtrado = STATE.menu.filter(p => {
      if (busquedaMenu && !String(p.platillo).toLowerCase().includes(busquedaMenu.toLowerCase())) return false;
      if (filtroCategoriaMenu && p.categoria !== filtroCategoriaMenu) return false;
      return true;
    });
    return `
      <div class="toolbar">
        <input placeholder="Buscar platillo…" value="${esc(busquedaMenu)}" oninput="busquedaMenu=this.value;document.getElementById('dueno-body').innerHTML=renderTabDueno();" style="flex:1;min-width:160px;">
        <select onchange="filtroCategoriaMenu=this.value;document.getElementById('dueno-body').innerHTML=renderTabDueno();">
          <option value="">Toda categoría</option>
          ${categorias.map(c => `<option value="${esc(c)}" ${filtroCategoriaMenu === c ? 'selected' : ''}>${esc(c)}</option>`).join('')}
        </select>
        <button class="btn-mini pri" onclick="abrirModalPlatillo(null)">+ Agregar platillo</button>
      </div>
      <div class="grid-menu">${filtrado.map(p => `
        <div class="menu-card">
          <div class="thumb" style="background:${p.imagenUrl ? 'none' : `linear-gradient(135deg, ${p.color || '#C7703C'}, #1F1B16)`}">${p.imagenUrl ? `<img src="${esc(p.imagenUrl)}">` : (p.emoji || '🍽️')}</div>
          <div class="body">
            <div class="cat">${esc(p.categoria)}</div>
            <div class="name">${esc(p.platillo)}</div>
            ${p.descripcion ? `<div class="desc">${esc(p.descripcion)}</div>` : ''}
            <div class="price">$${p.precio.toFixed(2)}</div>
            <span class="badge ${p.disponible ? 'badge-green' : 'badge-red'}" style="margin-top:6px;">${p.disponible ? 'Disponible' : 'Agotado'}</span>
            <div class="menu-actions">
              <button class="btn-mini" style="flex:1;" onclick="abrirModalPlatillo(${attr(p.id)})">✏ Editar</button>
              <button class="btn-mini" style="flex:1;" onclick="eliminarPlatillo(${attr(p.id)})">🗑 Eliminar</button>
            </div>
          </div>
        </div>`).join('')}</div>
      ${filtrado.length === 0 ? `<p style="color:var(--muted4);font-size:13px;font-style:italic;margin-top:16px;">Sin platillos que coincidan.</p>` : ''}
      <p style="color:var(--muted5);font-size:11px;font-style:italic;margin-top:14px;">Los cambios aquí (precio, disponibilidad, fotos) se reflejan al instante en el chat de Sofía y en la tablet del mesero.</p>`;
  }
  if (tabDueno === 'reservaciones') return tablaSimple('👥 Reservaciones', ['Fecha', 'Hora', 'Personas', 'Nombre', 'Teléfono', 'Registrada'],
    STATE.reservaciones.map(r => [r.fecha, r.hora, r.personas, r.nombre_cliente, r.telefono, r.time]), 'Sin reservaciones todavía. Aquí aparecerán las que Sofía confirme.');
  if (tabDueno === 'pedidos') return tablaSimple('🧾 Pedidos (mesas y chat)', ['Origen', 'Referencia', 'Platillos', 'Total', 'Estado', 'Hora'],
    STATE.pedidos.map(p => [p.origen === 'mesa' ? `🪑 Mesa ${p.mesa}` : '💬 Chat', p.referencia, p.items.map(it => `${it.cantidad}×${it.platillo}`).join(', '), '$' + p.total.toFixed(2), ESTADO_PEDIDO_LABEL[p.estado] || p.estado, p.hora]),
    'Sin pedidos todavía.');
  if (tabDueno === 'tickets') {
    return `<p style="font-size:15px;font-weight:600;margin-bottom:4px;">🛡️ Tickets transferidos a un humano</p>
      <p style="color:var(--muted2);font-size:12px;margin-bottom:14px;">Casos donde Sofía pausó las respuestas automáticas.</p>
      ${STATE.tickets.length === 0 ? `<p style="color:var(--muted4);font-size:13px;font-style:italic;">Sin tickets pendientes.</p>` :
        STATE.tickets.map(t => `<div class="comanda-card" style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;">
          <div><div style="font-size:13px;">${esc(t.motivo)}</div><div style="color:var(--muted2);font-size:11px;margin-top:2px;">${esc(t.time)}</div></div>
          <button class="btn-mini" onclick="reactivarTicket(${attr(t.id)})">Reactivar bot</button>
        </div>`).join('')}`;
  }
  if (tabDueno === 'config') {
    const claves = Object.keys(STATE.config);
    return `<p style="font-size:15px;font-weight:600;margin-bottom:14px;">⚙ Configuración del restaurante</p>
      <div style="max-width:420px;">${claves.map(clave => `
        <div style="margin-bottom:12px;">
          <label class="field-label" style="text-transform:none;">${esc(clave.replace(/_/g, ' '))}</label>
          <input class="field-input" value="${esc(STATE.config[clave])}" onchange="cambiarConfig(${attr(clave)}, this.value)">
        </div>`).join('')}</div>
      <p style="color:var(--muted5);font-size:11px;font-style:italic;">Los cambios se guardan al salir del campo.</p>`;
  }
  return '';
}
function tablaSimple(titulo, columnas, filas, vacio) {
  if (filas.length === 0) return `<p style="font-size:15px;font-weight:600;margin-bottom:14px;">${titulo}</p><p style="color:var(--muted4);font-size:13px;font-style:italic;">${vacio}</p>`;
  return `<p style="font-size:15px;font-weight:600;margin-bottom:14px;">${titulo}</p>
    <div style="overflow-x:auto;"><table class="simple"><thead><tr>${columnas.map(c => `<th>${c}</th>`).join('')}</tr></thead>
    <tbody>${filas.map(fila => `<tr>${fila.map(c => `<td>${esc(c)}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`;
}
async function reactivarTicket(id) { await backendPost({ action: 'delete', sheet: 'tickets', id }); await cargarTodo(); document.getElementById('dueno-body').innerHTML = renderTabDueno(); }
async function cambiarConfig(key, value) { STATE.config[key] = value; await backendPost({ action: 'upsert', sheet: 'config', data: { key, value } }); }
async function eliminarPlatillo(id) {
  if (!confirm('¿Eliminar este platillo del menú?')) return;
  await backendPost({ action: 'delete', sheet: 'menu', id });
  await cargarTodo();
  document.getElementById('dueno-body').innerHTML = renderTabDueno();
}
function abrirModalPlatillo(id) { modalPlatillo = id ? STATE.menu.find(p => p.id === id) : {}; renderView(); }
function cerrarModalPlatillo() { modalPlatillo = null; renderView(); }
function renderModalPlatillo() {
  const p = modalPlatillo;
  return `<div class="modal-overlay abierto"><div class="modal-box">
    <div class="head"><h3>${p.id ? 'Editar platillo' : 'Nuevo platillo'}</h3><button class="icon-btn" onclick="cerrarModalPlatillo()">✕</button></div>
    <label class="upload-box" style="background:${p.imagenUrl ? 'none' : `linear-gradient(135deg, ${p.color || '#C7703C'}, #1F1B16)`}">
      ${p.imagenUrl ? `<img src="${esc(p.imagenUrl)}">` : `<span style="font-size:26px;margin-bottom:4px;">${p.emoji || '🍽️'}</span><span>🖼 Toca para subir una foto real</span>`}
      <input type="file" accept="image/*" style="display:none;" onchange="subirImagenPlatillo(event)">
    </label>
    <label class="field-label" style="text-transform:none;">Nombre del platillo</label>
    <input id="mp-nombre" class="field-input" value="${esc(p.platillo || '')}">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
      <div><label class="field-label" style="text-transform:none;">Precio (MXN)</label><input id="mp-precio" type="number" class="field-input" value="${esc(p.precio || '')}"></div>
      <div><label class="field-label" style="text-transform:none;">Categoría</label><input id="mp-categoria" class="field-input" value="${esc(p.categoria || '')}"></div>
    </div>
    <label class="field-label" style="text-transform:none;">Descripción</label>
    <textarea id="mp-desc" class="field-input" style="min-height:60px;">${esc(p.descripcion || '')}</textarea>
    <label class="checkbox-row"><input type="checkbox" id="mp-disp" ${p.disponible !== false ? 'checked' : ''}> Disponible en el menú</label>
    <button class="btn-primary" style="margin-top:14px;" onclick="guardarPlatillo()">${p.id ? 'Guardar cambios' : 'Agregar platillo'}</button>
    <button class="icon-btn" style="width:100%;margin-top:8px;" onclick="cerrarModalPlatillo()">Cancelar</button>
  </div></div>`;
}
function subirImagenPlatillo(e) {
  const archivo = e.target.files[0];
  if (!archivo) return;
  const lector = new FileReader();
  lector.onload = ev => { modalPlatillo.imagenUrl = ev.target.result; renderView(); };
  lector.readAsDataURL(archivo);
}
async function guardarPlatillo() {
  const datos = {
    id: modalPlatillo.id || ('PLT-' + Math.random().toString(36).slice(2, 7).toUpperCase()),
    platillo: document.getElementById('mp-nombre').value.trim(),
    precio: Number(document.getElementById('mp-precio').value) || 0,
    categoria: document.getElementById('mp-categoria').value.trim(),
    descripcion: document.getElementById('mp-desc').value.trim(),
    disponible: document.getElementById('mp-disp').checked,
    emoji: modalPlatillo.emoji || '🍽️',
    color: modalPlatillo.color || '#C7703C',
    imagenUrl: modalPlatillo.imagenUrl || '',
  };
  if (!datos.platillo) return;
  await backendPost({ action: 'upsert', sheet: 'menu', data: datos });
  await cargarTodo();
  modalPlatillo = null;
  renderView();
}

// ==================== ARRANQUE ====================
async function iniciar() {
  await cargarTodo();
  // NOTA: mientras AtendIA esté en fase de demo, se salta el candado de licencia
  // y el login de turno para poder probar todo de inmediato. Antes de entregarle
  // esto a un cliente real, vuelve a llamar verificarSesionGuardada()/renderLogin()
  // en vez de entrar directo — el código sigue aquí, solo está desactivado.
  autenticado = true; usuarioActivo = 'demo';
  renderShell();
  // refresco periódico de pedidos para que mesero/cocina vean cambios de otros dispositivos
  setInterval(async () => {
    if (!autenticado) return;
    const pedidos = await backendGet('pedidos');
    STATE.pedidos = pedidos.map(p => ({ ...p, items: safeParse(p.items, []), total: Number(p.total) || 0 }));
    if (currentTab === 'cocina' || currentTab === 'mesero') renderView();
  }, 8000);
}
iniciar();
</script>
